<script>
// Currency system
let sessionHistory = [];
let isReversingTransaction = false;
    
const KNUTAS_IN_SIRPS = 5;
const SIRPS_IN_GALEON = 5;
const KNUTAS_IN_GALEON = KNUTAS_IN_SIRPS * SIRPS_IN_GALEON;

function toKnutas(g = 0, s = 0, k = 0) {
    return g * KNUTAS_IN_GALEON + s * KNUTAS_IN_SIRPS + k;
}

    
function fromKnutas(total) {
    const g = Math.floor(total / KNUTAS_IN_GALEON);
    const remainder = total % KNUTAS_IN_GALEON;
    const s = Math.floor(remainder / KNUTAS_IN_SIRPS);
    const k = remainder % KNUTAS_IN_SIRPS;
    return { g, s, k };
}

function formatMoney(knutas) {
    const m = fromKnutas(knutas);
    return `${m.g}G ${m.s}S ${m.k}K`;
}

// Items with images
let items = {};
let basket = {};
let totalKnutas = 0;
let children = [];
let selectedChild = null;
let cashierPin = "";   
let isSavingPurchase = false;
for (let name in items) {
    basket[name] = 0;
}

const SHEET_URL = "https://script.google.com/macros/s/AKfycbxPv8gdrJuzeJR0epMYjbmpkuDrw5rx05RggFlMzoei8tA46flvI6ETPnxW-L7nSI35/exec"; 

const itemsDiv = document.getElementById("items");
let isCashingOutMuggleMoney = false;

function centsToEurosText(cents) {
    return (Number(cents || 0) / 100).toFixed(2);
}

function normalizeCashOutChoice(input) {
    const value = String(input || "")
        .trim()
        .toLowerCase();

    if (value.includes("burv")) {
        return "magic";
    }

    if (value.includes("vient")) {
        return "deposit";
    }

    if (value.includes("ab")) {
        return "both";
    }

    return "";
}

function getCashOutModeLabel(mode) {
    if (mode === "magic") {
        return "Burvju nauda";
    }

    if (mode === "deposit") {
        return "Vientiešu nauda / depozīts";
    }

    if (mode === "both") {
        return "Burvju nauda + vientiešu nauda";
    }

    return "";
}

function setCashOutButtonSaving(isSaving) {
    const button = document.getElementById("cashOutMuggleButton");

    if (!button) {
        return;
    }

    button.disabled = isSaving;
    button.textContent = isSaving
        ? "Izņem..."
        : "Izņemt vientiešu naudu";
}
async function cashOutMuggleMoney() {
    if (isCashingOutMuggleMoney) {
        return;
    }

    if (!selectedChild) {
        alert("Vispirms izvēlies bērnu!");
        return;
    }

    const input = prompt(
        "Ko izņemt?\n\n" +
        "Ieraksti vienu no šiem:\n" +
        "- burvju\n" +
        "- vientiešu\n" +
        "- abi",
        "abi"
    );

    if (input === null) {
        return;
    }

    const mode = normalizeCashOutChoice(input);

    if (!mode) {
        alert("Ieraksti: burvju, vientiešu vai abi");
        return;
    }

    const cashOutMagic = mode === "magic" || mode === "both";
    const cashOutDeposit = mode === "deposit" || mode === "both";

    const magicKnutas = cashOutMagic
        ? Number(selectedChild.balanceKnutas) || 0
        : 0;

    const magicEuroCents = magicKnutas * 6;

    const depositCents = cashOutDeposit
        ? Number(selectedChild.depositBalanceCents) || 0
        : 0;

    const totalPayoutCents = magicEuroCents + depositCents;

    if (totalPayoutCents <= 0) {
        alert("Bērnam nav naudas, ko izņemt.");
        return;
    }

    const confirmed = confirm(
        `Izņemt vientiešu naudā?\n\n` +
        `Pircējs: ${selectedChild.name} ${selectedChild.surname}\n` +
        `Māja: ${selectedChild.house}\n\n` +
        `Izvēle: ${getCashOutModeLabel(mode)}\n\n` +
        `Burvju nauda: ${formatMoney(magicKnutas)} = ${centsToEurosText(magicEuroCents)} €\n` +
        `Vientiešu nauda / depozīts: ${centsToEurosText(depositCents)} €\n\n` +
        `KOPĀ JĀATDOD: ${centsToEurosText(totalPayoutCents)} €\n\n` +
        `Pēc šī izvēlētā nauda bērna bilancē būs 0.`
    );

    if (!confirmed) {
        return;
    }

    isCashingOutMuggleMoney = true;
    setCashOutButtonSaving(true);

    try {
        const response = await fetch(SHEET_URL, {
            method: "POST",
            body: JSON.stringify({
                action: "cashOutMuggleMoney",
                pin: cashierPin,
                childId: selectedChild.childId,
                mode: mode
            })
        });

        const result = await response.json();

        if (!result.success) {
            alert(result.message || "Neizdevās izņemt naudu.");
            return;
        }

        alert(
            `Nauda izņemta!\n\n` +
            `Bērnam jāatdod: ${result.totalPayoutText} €`
        );

        if (typeof refreshChildrenOnly === "function") {
            await refreshChildrenOnly();
        } else {
            await loadItemsFromSheet();
        }

    } catch (error) {
        alert("Kļūda! Nauda netika izņemta.");
        console.error(error);

    } finally {
        isCashingOutMuggleMoney = false;
        setCashOutButtonSaving(false);
    }
}
async function loadItemsFromSheet() {
    try {
        const response = await fetch(SHEET_URL + "?pin=" + encodeURIComponent(cashierPin));
        console.log("Fetching from:", SHEET_URL);
        const data = await response.json();
        if (!data.success) {
            throw new Error(data.message || "Nepareizs PIN");
        }
        const sheetItems = data.items;
        children = data.children;

        items = {};
        basket = {};
        totalKnutas = 0;

        itemsDiv.innerHTML = "";

        sheetItems.sort((a, b) => {
            const priceA = toKnutas(a.g, a.s, a.k);
            const priceB = toKnutas(b.g, b.s, b.k);
            return priceB - priceA;
        });

        sheetItems.forEach(item => {
            items[item.name] = {
                price: toKnutas(item.g, item.s, item.k),
                image: item.image
            };

            basket[item.name] = 0;
        });

        createItemCards();
        loadHouseDropdown();
        updateDisplay();
    return true;
    } catch (error) {
        console.error("Could not load data:", error);
        alert(error.message || "Neizdevās ielādēt datus.");
        return false;
        itemsDiv.innerHTML = `
            <div class="loading-message">
                Neizdevās ielādēt preces vai bērnus 😭<br>
                Pārbaudi Apps Script linku.
            </div>
        `;
    }
}
function setBuyButtonSaving(isSaving) {
    const button = document.getElementById("buyButton");

    if (!button) {
        return;
    }

    button.disabled = isSaving;
    button.textContent = isSaving ? "Saglabā..." : "PIRKT";
}
function createCustomItemCard() {
    const row = document.createElement("div");
    row.className = "item-row custom-item-card";

    const placeholder = document.createElement("div");
    placeholder.className = "item-placeholder";
    placeholder.textContent = "?";

    const label = document.createElement("div");
    label.className = "item-name";

    const nameText = document.createElement("div");
    nameText.className = "product-name";
    nameText.textContent = "Cita prece";

    const priceText = document.createElement("div");
    priceText.className = "product-price";
    priceText.textContent = "Ievadīt cenu";

    label.appendChild(nameText);
    label.appendChild(priceText);

    row.appendChild(placeholder);
    row.appendChild(label);

    row.onclick = addCustomItem;

    itemsDiv.appendChild(row);
}

function addCustomItem() {
    const g = parseInt(prompt("Cik galeoni?", "0")) || 0;
    const s = parseInt(prompt("Cik sirpi?", "0")) || 0;
    const k = parseInt(prompt("Cik knutas?", "0")) || 0;

    const price = toKnutas(g, s, k);

    if (price <= 0) {
        alert("Cena nevar būt 0.");
        return;
    }

    const customKey = "custom-" + price;

    if (!items[customKey]) {
        items[customKey] = {
            displayName: "Cita prece (" + formatMoney(price) + ")",
            price: price,
            image: ""
        };

        basket[customKey] = 0;
    }

    addItem(customKey);
}
function createItemCards() {
    itemsDiv.innerHTML = "";

    for (let name in items) {
        const row = document.createElement("div");
        row.className = "item-row";

        if (items[name].image) {
            const img = document.createElement("img");
            img.src = items[name].image;
            row.appendChild(img);
        } else {
            const placeholder = document.createElement("div");
            placeholder.className = "item-placeholder";
            placeholder.textContent = "✦";
            row.appendChild(placeholder);
        }

        const label = document.createElement("div");
        label.className = "item-name";

        const nameText = document.createElement("div");
        nameText.className = "product-name";
        nameText.textContent = name;

        const priceText = document.createElement("div");
        priceText.className = "product-price";
        priceText.textContent = formatMoney(items[name].price);

        label.appendChild(nameText);
        label.appendChild(priceText);

        row.appendChild(label);

        row.onclick = () => {
            addItem(name);

            row.classList.add("added");
            setTimeout(() => {
                row.classList.remove("added");
            }, 180);
        };

        itemsDiv.appendChild(row);
    }
    createCustomItemCard();
}



function addItem(name) {
    basket[name]++;
    totalKnutas += items[name].price;
    updateDisplay();
    calculateChange();
}

function removeItem(name) {
    if (basket[name] > 0) {
        basket[name]--;
        totalKnutas -= items[name].price;
        updateDisplay();
        calculateChange();
    }
}

function updateDisplay() {
    const basketDiv = document.getElementById("basket");
    basketDiv.innerHTML = "";

    let hasItems = false;

    for (let name in basket) {
        if (basket[name] > 0) {
            hasItems = true;

            const line = document.createElement("div");
            line.className = "basket-line";

            const text = document.createElement("span");
            text.className = "basket-text";
            text.textContent = items[name].displayName || name;

            const controls = document.createElement("div");
            controls.className = "basket-controls";

            const minus = document.createElement("button");
            minus.textContent = "-";
            minus.className = "remove-btn";
            minus.onclick = () => removeItem(name);

            const quantity = document.createElement("span");
            quantity.className = "basket-quantity";
            quantity.textContent = basket[name];

            const plus = document.createElement("button");
            plus.textContent = "+";
            plus.className = "add-btn";
            plus.onclick = () => addItem(name);

            controls.appendChild(minus);
            controls.appendChild(quantity);
            controls.appendChild(plus);

            line.appendChild(text);
            line.appendChild(controls);

            basketDiv.appendChild(line);
        }
    }

    if (!hasItems) {
        const emptyMessage = document.createElement("div");
        emptyMessage.className = "empty-basket";
        emptyMessage.innerHTML = "🧺<br>Grozs ir tukšs.<br>Pieskaries precei, lai to pievienotu.";
        basketDiv.appendChild(emptyMessage);
    }

    document.getElementById("total").textContent =
        "Kopā jāmaksā: " + formatMoney(totalKnutas);
}

function calculateChange() {
    const g = parseInt(document.getElementById("paidG").value) || 0;
    const s = parseInt(document.getElementById("paidS").value) || 0;
    const k = parseInt(document.getElementById("paidK").value) || 0;

    const paid = toKnutas(g, s, k);

    if (paid < totalKnutas) {
        const missing = totalKnutas - paid;
        document.getElementById("change").textContent =
            "Pietrūkst: " + formatMoney(missing);
        return;
    }

    const change = paid - totalKnutas;

    document.getElementById("change").textContent =
        "Atlikums: " + formatMoney(change);
}

function changePaid(id, amount) {
    const input = document.getElementById(id);
    let current = parseInt(input.value) || 0;

    current += amount;

    if (current < 0) {
        current = 0;
    }

    input.value = current;
    calculateChange();
}

function setExactPayment() {
    const exact = fromKnutas(totalKnutas);

    document.getElementById("paidG").value = exact.g;
    document.getElementById("paidS").value = exact.s;
    document.getElementById("paidK").value = exact.k;

    calculateChange();
}

function clearPaid() {
    document.getElementById("paidG").value = 0;
    document.getElementById("paidS").value = 0;
    document.getElementById("paidK").value = 0;

    calculateChange();
}  
  
  
function checkout() {
    if (totalKnutas === 0) {
        alert("Nav izvēlēti produkti!");
        return;
    }

    let receipt = "Čeks\n\n";

    for (let name in basket) {
        if (basket[name] > 0) {
            const lineTotal = basket[name] * items[name].price;
            const displayName = items[name].displayName || name;
            receipt += `${displayName} x${basket[name]} - ${formatMoney(lineTotal)}\n`;
        }
    }

    receipt += "\nKOPĀ: " + formatMoney(totalKnutas);

    alert(receipt);
}

function resetBasket() {
    totalKnutas = 0;

    for (let name in basket) {
        basket[name] = 0;
    }

    updateDisplay();

    document.getElementById("paidG").value = 0;
    document.getElementById("paidS").value = 0;
    document.getElementById("paidK").value = 0;

    document.getElementById("change").textContent = "Atlikums: 0G 0S 0K";
}

let selectedHouse = "";

function loadHouseDropdown() {
    const houseSelect = document.getElementById("houseSelect");
    const childSelect = document.getElementById("childSelect");

    houseSelect.innerHTML = `<option value="">Izvēlies torni...</option>`;
    childSelect.innerHTML = `<option value="">Vispirms izvēlies torni...</option>`;
    childSelect.disabled = true;

    const houses = [...new Set(children.map(child => child.house))]
        .filter(house => house)
        .sort((a, b) => a.localeCompare(b, "lv"));

    houses.forEach(house => {
        const option = document.createElement("option");
        option.value = house;
        option.textContent = house;
        houseSelect.appendChild(option);
    });
}

function selectHouse() {
    selectedHouse = document.getElementById("houseSelect").value;
    selectedChild = null;

    const childSelect = document.getElementById("childSelect");

    childSelect.innerHTML = "";

    if (!selectedHouse) {
        childSelect.innerHTML = `<option value="">Vispirms izvēlies torni...</option>`;
        childSelect.disabled = true;
        updateChildBalance();
        return;
    }

    childSelect.disabled = false;
    childSelect.innerHTML = `<option value="">Izvēlies bērnu...</option>`;

    const filteredChildren = children
        .filter(child => child.house === selectedHouse)
        .sort((a, b) => {
            const surnameCompare = a.surname.localeCompare(b.surname, "lv");

            if (surnameCompare !== 0) {
                return surnameCompare;
            }

            return a.name.localeCompare(b.name, "lv");
        });

    filteredChildren.forEach(child => {
        const option = document.createElement("option");
        option.value = child.childId;
        option.textContent = `${child.surname} ${child.name}`;
        childSelect.appendChild(option);
    });

    updateChildBalance();
}

function selectChild() {
    const selectedId = document.getElementById("childSelect").value;

    selectedChild = children.find(child => child.childId === selectedId) || null;

    updateChildBalance();
}

function updateChildBalance() {
    const balanceDiv = document.getElementById("childBalance");
    const depositDiv = document.getElementById("childDeposit");

    if (!selectedChild) {
        balanceDiv.textContent = "Maģiskā nauda: -";
        depositDiv.textContent = "Depozīts: -";
        return;
    }

    balanceDiv.textContent =
        `Maģiskā nauda: ${selectedChild.balanceG}G ${selectedChild.balanceS}S ${selectedChild.balanceK}K`;

    depositDiv.textContent =
        `Depozīts: ${selectedChild.depositBalanceText} €`;
}
async function buyForChild() {
    if (isSavingPurchase) {
        return;
    }

    if (!selectedChild) {
        alert("Vispirms izvēlies bērnu!");
        return;
    }

    if (totalKnutas === 0) {
        alert("Nav izvēlēti produkti!");
        return;
    }

    if (totalKnutas > selectedChild.balanceKnutas) {
        alert("Bērnam nepietiek naudas!");
        return;
    }

    const boughtItems = [];

    for (let name in basket) {
        if (basket[name] > 0) {
            boughtItems.push({
                name: items[name].displayName || name,
                quantity: basket[name]
            });
        }
    }

    const itemList = boughtItems
        .map(item => `${item.name} x${item.quantity}`)
        .join("\n");

    const confirmationMessage =
        `Apstiprināt pirkumu?\n\n` +
        `Pircējs: ${selectedChild.name} ${selectedChild.surname}\n` +
        `Māja: ${selectedChild.house}\n\n` +
        `Preces:\n${itemList}\n\n` +
        `Kopā: ${formatMoney(totalKnutas)}`;

    const confirmed = confirm(confirmationMessage);

    if (!confirmed) {
        return;
    }

    isSavingPurchase = true;
    setBuyButtonSaving(true);

    const purchaseData = {
        pin: cashierPin,
        childId: selectedChild.childId,
        totalKnutas: totalKnutas,
        items: boughtItems
    };

    try {
        const response = await fetch(SHEET_URL, {
            method: "POST",
            body: JSON.stringify(purchaseData)
        });

        const result = await response.json();

        if (!result.success) {
            alert(result.message || "Kļūda! Pirkums netika saglabāts.");
            return;
        }

        alert("Pirkums saglabāts!");
        addSessionHistory({
            type: "purchase",
            childId: selectedChild.childId,
            childName: selectedChild.name,
            childSurname: selectedChild.surname,
            house: selectedChild.house,
            totalKnutas: totalKnutas,
            items: boughtItems.map(item => ({
                name: item.name,
                quantity: item.quantity
            }))
        });
        selectedChild.balanceKnutas -= totalKnutas;

        const newBalance = fromKnutas(selectedChild.balanceKnutas);
        selectedChild.balanceG = newBalance.g;
        selectedChild.balanceS = newBalance.s;
        selectedChild.balanceK = newBalance.k;

        updateChildBalance();
        resetBasket();

        if (typeof resetBuyerSelection === "function") {
            resetBuyerSelection();
        }

    } catch (error) {
        alert("Kļūda! Pirkums netika saglabāts.");
        console.error(error);

    } finally {
        isSavingPurchase = false;
        setBuyButtonSaving(false);
    }
}
async function loginWithPin() {
    const pinInput = document.getElementById("pinInput");
    cashierPin = pinInput.value.trim();

    if (!cashierPin) {
        alert("Ievadi PIN!");
        return;
    }

    const success = await loadItemsFromSheet();

    if (success === false) {
        cashierPin = "";
        return;
    }

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("appContainer").style.display = "block";
}
function parseEuroInputToCents(input) {
    const cleaned = String(input || "")
        .replace(",", ".")
        .replace(/[^\d.]/g, "");

    const euros = parseFloat(cleaned);

    if (isNaN(euros)) {
        return 0;
    }

    return Math.round(euros * 100);
}

function centsToEurosText(cents) {
    return (cents / 100).toFixed(2);
}   
async function withdrawFromDeposit() {
    if (!selectedChild) {
        alert("Vispirms izvēlies bērnu!");
        return;
    }

    const depositCents = Number(selectedChild.depositBalanceCents) || 0;

    if (depositCents < 6) {
        alert("Bērnam depozītā nepietiek naudas.");
        return;
    }

    const input = prompt(
        `Cik euro izņemt no depozīta?\n\nPieejams: ${selectedChild.depositBalanceText} €`,
        "2"
    );

    if (input === null) {
        return;
    }

    const requestedEuroCents = parseEuroInputToCents(input);

    if (requestedEuroCents <= 0) {
        alert("Ievadi derīgu summu.");
        return;
    }

    // 1 Knuta = 0.06 EUR = 6 cents
    const magicKnutas = Math.floor(requestedEuroCents / 6);
    const availableMagicKnutas = Math.floor(depositCents / 6);

    if (magicKnutas <= 0) {
        alert("Summa ir par mazu. Mazākā iespējamā summa ir 0.06 €.");
        return;
    }

    if (magicKnutas > availableMagicKnutas) {
        alert("Bērnam depozītā nav tik daudz naudas.");
        return;
    }

    const usedDepositCents = magicKnutas * 6;
    const magic = fromKnutas(magicKnutas);

    const confirmed = confirm(
        `Izņemt no depozīta?\n\n` +
        `Pircējs: ${selectedChild.name} ${selectedChild.surname}\n` +
        `Depozītā šobrīd: ${selectedChild.depositBalanceText} €\n\n` +
        `Ievadīts: ${centsToEurosText(requestedEuroCents)} €\n` +
        `No depozīta noņems: ${centsToEurosText(usedDepositCents)} €\n` +
        `Pievienos maģisko naudu: ${magic.g}G ${magic.s}S ${magic.k}K`
    );

    if (!confirmed) {
        return;
    }

    try {
        const response = await fetch(SHEET_URL, {
            method: "POST",
            body: JSON.stringify({
                action: "depositWithdrawal",
                pin: cashierPin,
                childId: selectedChild.childId,
                requestedEuroCents: requestedEuroCents
            })
        });

        const result = await response.json();

        if (!result.success) {
            alert(result.message || "Neizdevās izņemt depozītu.");
            return;
        }

        alert(
            `Depozīts izņemts!\n\n` +
            `Pievienots: ${result.magicG}G ${result.magicS}S ${result.magicK}K\n` +
            `Noņemts no depozīta: ${result.usedDepositText} €`
        );
        addSessionHistory({
            type: "deposit",
            childId: selectedChild.childId,
            childName: selectedChild.name,
            childSurname: selectedChild.surname,
            house: selectedChild.house,
            usedDepositCents: result.usedDepositCents,
            magicKnutas: result.magicKnutas
        });
        await refreshChildrenOnly();

    } catch (error) {
        alert("Kļūda! Depozīts netika izņemts.");
        console.error(error);
    }
}
async function refreshChildrenOnly() {
    if (!cashierPin) {
        return false;
    }

    if (!selectedChild) {
        return false;
    }

    const selectedId = selectedChild.childId;

    try {
        const response = await fetch(
            SHEET_URL + "?pin=" + encodeURIComponent(cashierPin) + "&t=" + Date.now()
        );

        const data = await response.json();

        if (!data.success) {
            throw new Error(data.message || "Neizdevās pārlādēt datus.");
        }

        children = data.children;

        const updatedChild = children.find(child =>
            String(child.childId).trim() === String(selectedId).trim()
        );

        if (updatedChild) {
            selectedChild = updatedChild;
            updateChildBalance();
        }

        return true;

    } catch (error) {
        console.error("Could not refresh children:", error);
        return false;
    }
}
function resetBuyerSelection() {
    selectedHouse = "";
    selectedChild = null;

    const houseSelect = document.getElementById("houseSelect");
    const childSelect = document.getElementById("childSelect");

    if (houseSelect) {
        houseSelect.value = "";
    }

    if (childSelect) {
        childSelect.innerHTML = `<option value="">Vispirms izvēlies māju...</option>`;
        childSelect.disabled = true;
    }

    updateChildBalance();
}
function addSessionHistory(entry) {
    sessionHistory.unshift({
        ...entry,
        localId: "tx-" + Date.now() + "-" + Math.random().toString(16).slice(2),
        time: new Date().toLocaleTimeString("lv-LV", {
            hour: "2-digit",
            minute: "2-digit"
        }),
        reversed: false
    });

    renderSessionHistory();
}
function toggleSessionHistory() {
    const panel = document.getElementById("historyPanel");

    if (!panel) {
        return;
    }

    if (panel.style.display === "none") {
        panel.style.display = "block";
        renderSessionHistory();
    } else {
        panel.style.display = "none";
    }
}
function renderSessionHistory() {
    const list = document.getElementById("historyList");

    if (!list) {
        return;
    }

    list.innerHTML = "";

    if (sessionHistory.length === 0) {
        list.innerHTML = `
            <div class="empty-basket">
                Šajā sesijā vēl nav pirkumu vai depozīta izņemšanu.
            </div>
        `;
        return;
    }

    sessionHistory.forEach(entry => {
        const div = document.createElement("div");
        div.className = "history-entry";

        const title = document.createElement("div");
        title.className = "history-entry-title";

        const details = document.createElement("div");
        details.className = "history-entry-details";

        if (entry.type === "purchase") {
            title.textContent =
                `${entry.time} · PIRKUMS · ${entry.childName} ${entry.childSurname}`;

            const itemText = entry.items
                .map(item => `${item.name} x${item.quantity}`)
                .join("\n");

            details.textContent =
                `Māja: ${entry.house}\n` +
                `Kopā: ${formatMoney(entry.totalKnutas)}\n` +
                itemText;
        }

        if (entry.type === "deposit") {
            title.textContent =
                `${entry.time} · DEPOZĪTS · ${entry.childName} ${entry.childSurname}`;

            details.textContent =
                `Māja: ${entry.house}\n` +
                `No depozīta: ${centsToEurosText(entry.usedDepositCents)} €\n` +
                `Pievienots: ${formatMoney(entry.magicKnutas)}`;
        }

        const button = document.createElement("button");
        button.className = "reverse-btn";
        button.textContent = entry.reversed ? "Atcelts" : "Atcelt";
        button.disabled = entry.reversed || isReversingTransaction;
        button.onclick = () => reverseSessionTransaction(entry.localId);

        div.appendChild(title);
        div.appendChild(details);
        div.appendChild(button);

        list.appendChild(div);
    });
}
async function reverseSessionTransaction(localId) {
    if (isReversingTransaction) {
        return;
    }

    const entry = sessionHistory.find(item => item.localId === localId);

    if (!entry || entry.reversed) {
        return;
    }

    let message = "";

    if (entry.type === "purchase") {
        message =
            `Atcelt šo pirkumu?\n\n` +
            `${entry.childName} ${entry.childSurname}\n` +
            `Kopā: ${formatMoney(entry.totalKnutas)}\n\n` +
            `Tas pievienos naudu atpakaļ bērna atlikumam.`;
    }

    if (entry.type === "deposit") {
        message =
            `Atcelt šo depozīta izņemšanu?\n\n` +
            `${entry.childName} ${entry.childSurname}\n` +
            `No depozīta: ${centsToEurosText(entry.usedDepositCents)} €\n` +
            `Maģiskā nauda: ${formatMoney(entry.magicKnutas)}\n\n` +
            `Tas noņems šo maģisko naudu un atgriezīs depozītu.`;
    }

    const confirmed = confirm(message);

    if (!confirmed) {
        return;
    }

    isReversingTransaction = true;
    renderSessionHistory();

    let payload = {
        pin: cashierPin,
        childId: entry.childId
    };

    if (entry.type === "purchase") {
        payload.action = "reversePurchase";
        payload.totalKnutas = entry.totalKnutas;
        payload.items = entry.items;
    }

    if (entry.type === "deposit") {
        payload.action = "reverseDepositWithdrawal";
        payload.magicKnutas = entry.magicKnutas;
        payload.usedDepositCents = entry.usedDepositCents;
    }

    try {
        const response = await fetch(SHEET_URL, {
            method: "POST",
            body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (!result.success) {
            alert(result.message || "Neizdevās atcelt darījumu.");
            return;
        }

        entry.reversed = true;

        alert("Darījums atcelts!");

        await loadItemsFromSheet();

    } catch (error) {
        alert("Kļūda! Darījumu neizdevās atcelt.");
        console.error(error);

    } finally {
        isReversingTransaction = false;
        renderSessionHistory();
    }
}
